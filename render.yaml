services:
  # 1. DATABASE MYSQL
  - type: database
    name: teh_desa_db
    databaseName: teh_desa_ump
    user: faizna_admin
    plan: free

  # 2. BACKEND NODE.JS
  - type: web
    name: teh-desa-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: teh_desa_db
          property: connectionString

  # 3. FRONTEND REACT
  - type: web
    name: teh-desa-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/build